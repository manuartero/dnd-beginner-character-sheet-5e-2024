name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Quality gate
        run: pnpm lint && pnpm test && pnpm build

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Determine version bump
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s%n%b")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          CURRENT=$(node -e "console.log(require('./package.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Bump package.json version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.new_version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Update README badges
        run: |
          PCT=$(node -e "const s=JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json','utf8'));console.log(Math.round(s.total.lines.pct))")

          if   [ "$PCT" -ge 80 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 60 ]; then COLOR="yellow"
          elif [ "$PCT" -ge 40 ]; then COLOR="orange"
          else                         COLOR="red"
          fi

          COVERAGE_BADGE="![Coverage](https://img.shields.io/badge/coverage-${PCT}%25-${COLOR})"
          sed -i "s|!\[Coverage\](https://img\.shields\.io/badge/coverage-[^)]*)|${COVERAGE_BADGE}|" README.md

          VERSION_BADGE="![Version](https://img.shields.io/badge/version-v${{ steps.version.outputs.new_version }}-blue)"
          sed -i "s|!\[Version\](https://img\.shields\.io/badge/version-[^)]*)|${VERSION_BADGE}|" README.md

      - name: Commit release changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json README.md
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push changes and tag
        run: git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
